{{ define "year_race_chart" }}

    {{ if .Weeks }}

        <svg viewBox="{{ .SvgView }}" style="width:100%; max-width:1000px; display:block;">
            {{ $left   := .Pad }}
            {{ $top    := .Pad }}
            {{ $right  := sub .Width .PadRight }}
            {{ $bottom := sub .Height .Pad }}

            <!-- Axes -->
            <path d="M {{ $left }} {{ $top }} L {{ $left }} {{ $bottom }} L {{ $right }} {{ $bottom }}"
                  fill="none" stroke="currentColor" opacity="0.35"/>

            <!-- Y axis label ("Wins"), rotated -->
            {{ $yMid := divf .Height 2.0 }}
            {{ $yLabelX := sub .Pad 32.0 }}
            <text x="{{ $yLabelX }}" y="{{ $yMid }}"
                  transform="rotate(-90, {{ $yLabelX }}, {{ $yMid }})"
                  text-anchor="middle" fill="currentColor" opacity="0.45" font-size="12">Wins</text>

            <!-- Y gridlines + labels -->
            {{ range .YTicks }}
                <path d="M {{ $left }} {{ sub .Y 4 }} L {{ $right }} {{ sub .Y 4 }}"
                      fill="none" stroke="currentColor" opacity="0.10"/>
                <text x="{{ .X }}" y="{{ .Y }}" text-anchor="end"
                      fill="currentColor" opacity="0.55" font-size="12">
                    {{ .Label }}
                </text>
            {{ end }}

            <!-- X ticks + labels -->
            {{ range .XTicks }}
                <path d="M {{ .X }} {{ $bottom }} L {{ .X }} {{ add $bottom 6 }}"
                      fill="none" stroke="currentColor" opacity="0.25"/>
                <text x="{{ .X }}" y="{{ .Y }}" text-anchor="middle"
                      fill="currentColor" opacity="0.55" font-size="12">
                    {{ .Label }}
                </text>
            {{ end }}

            <!-- X axis label ("Week") -->
            <text x="{{ divf (add $left $right) 2.0 }}" y="{{ add $bottom 34 }}"
                  text-anchor="middle" fill="currentColor" opacity="0.45" font-size="12">Week</text>

            <!-- Series lines -->
            {{ range .Series }}
                <path d="{{ .Path }}" fill="none" stroke="{{ .Color }}"
                      stroke-width="2.5" opacity="0.90"/>
            {{ end }}

            <!-- Series markers + tooltips -->
            {{ range $s := .Series }}
                {{ range $p := $s.Points }}
                    <circle cx="{{ $p.X }}" cy="{{ $p.Y }}" r="3.5" fill="{{ $s.Color }}" opacity="0.95">
                        <title>{{ $p.Title }}</title>
                    </circle>
                {{ end }}
            {{ end }}

            <!-- End-of-line labels -->
            {{ range .Series }}
                {{ if .EndLabel }}
                    <text x="{{ add .LastX 10.0 }}" y="{{ add .LastY 4.0 }}"
                          fill="{{ .Color }}" font-size="11" opacity="0.9">{{ .EndLabel }}</text>
                {{ end }}
            {{ end }}

        </svg>

        <!-- Legend -->
        <div style="display:flex; flex-wrap:wrap; gap:16px; margin-top:10px; padding-left:4px;">
            {{ range .Series }}
                <div style="display:flex; align-items:center; gap:8px; font-size:0.88rem;">
                    <span style="display:inline-block; width:20px; height:3px; border-radius:2px; background:{{ .Color }};"></span>
                    {{ .Name }}
                </div>
            {{ end }}
        </div>

    {{ else }}

        <div class="hint">No games found for this year yet.</div>

    {{ end }}

{{ end }}
