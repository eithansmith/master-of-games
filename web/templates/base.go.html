{{ define "base" }}
    <!doctype html>
    <!--suppress HtmlUnknownTarget -->
    <html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>{{ .Title }}</title>

        <script src="https://unpkg.com/htmx.org@1.9.12"></script>
        <script src="https://unpkg.com/alpinejs" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"/>
        <link rel="stylesheet" href="/static/app.css"/>
    </head>
    <body>
    <header class="topbar">
        <div class="container">
            <div class="brand">🏆 Master of Games</div>
            <nav class="nav">
                <a class="nav-link" href="/">Log</a>
                <a class="nav-link" href="/weeks/current">Week</a>
                <a class="nav-link" href="/years/{{ .YearNow }}">Year</a>
                <a class="nav-link" href="/players">Players</a>
                <a class="nav-link" href="/titles">Titles</a>
            </nav>
        </div>
    </header>

    <main class="container" id="main">
        {{ template "main" . }}
        <div id="busy" class="htmx-indicator">Saving...</div>
    </main>

    <footer class="container footer">
        version: {{.Version}}<br>
        {{if ne .BuildTime ""}}built: {{.BuildTime}}<br>{{end}}
        started: {{.StartTime}}
    </footer>
    <script>
        document.body.addEventListener("showToast", function (e) {
            Toastify({
                text: e.detail.message,
                duration: 3000,
                gravity: "top",
                position: "right",
                stopOnFocus: true,
            }).showToast();
        });
    </script>
    </body>
    </html>
{{end}}
