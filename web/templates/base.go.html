{{ define "base" }}
    <!doctype html>
    <!--suppress HtmlUnknownTarget -->
    <html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>{{ .Title }}</title>

        <!--suppress JSUnresolvedReference -->
        <script>
            // Runs before CSS renders to avoid a flash of the wrong theme.
            (function () {
                var saved = localStorage.getItem('theme');
                var osLight = window.matchMedia('(prefers-color-scheme: light)').matches;
                document.documentElement.setAttribute('data-theme', saved || (osLight ? 'light' : 'dark'));
            })();
        </script>

        <script src="https://unpkg.com/htmx.org@1.9.12"></script>
        <script src="https://unpkg.com/alpinejs" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"/>
        <link rel="stylesheet" href="/static/app.css"/>
    </head>
    <body>
    <header class="topbar">
        <div class="container">
            <div class="brand">🏆 Master of Games</div>
            <nav class="nav">
                <a class="nav-link" href="/">Log</a>
                <a class="nav-link" href="/weeks/current">Week</a>
                <a class="nav-link" href="/years/{{ .YearNow }}">Year</a>
                <a class="nav-link" href="/players">Players</a>
                <a class="nav-link" href="/titles">Titles</a>
                <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
            </nav>
        </div>
    </header>

    <main class="container" id="main">
        {{ template "main" . }}
        <div id="busy" class="htmx-indicator">Saving...</div>
    </main>

    <footer class="container footer">
        version: {{.Version}}<br>
        {{if ne .BuildTime ""}}built: {{.BuildTime}}<br>{{end}}
        started: {{.StartTime}}
    </footer>
    <!--suppress JSUnresolvedReference -->
    <script>
        document.body.addEventListener("showToast", function (e) {
            Toastify({
                text: e.detail.message,
                duration: 3000,
                gravity: "top",
                position: "right",
                stopOnFocus: true,
            }).showToast();
        });

        function toggleTheme() {
            var html = document.documentElement;
            var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateToggleLabel(next);
        }

        function updateToggleLabel(theme) {
            var btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = theme === 'dark' ? 'Light' : 'Dark';
        }

        updateToggleLabel(document.documentElement.getAttribute('data-theme'));
    </script>
    </body>
    </html>
{{end}}
